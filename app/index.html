<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陈列小助手</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231d4ed8'/%3E%3Ctext x='2' y='12' font-size='10' fill='%23bfdbfe'%3E桌%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════
     SETUP WIZARD MODAL
  ═══════════════════════════════════════════════ -->
<div id="setup-overlay" class="overlay">
  <div class="setup-card">
    <div class="setup-header">
      <div class="setup-icon">📐</div>
      <h2>新建桌子</h2>
      <p class="setup-sub">配置好参数后，就可以开始搭积木式地摆放元素了。</p>
    </div>
    <div class="setup-body">
      <div class="field">
        <label>桌子名称</label>
        <input type="text" id="setup-name" placeholder="我的桌子" maxlength="40" />
      </div>
      <div class="field">
        <label>桌子宽度</label>
        <div class="preset-chips" id="setup-width-chips"></div>
        <div class="field-row" style="margin-top:8px">
          <input type="number" id="setup-width-custom" placeholder="自定义 (英寸)" min="24" max="480" step="1" />
          <span class="field-unit">英寸</span>
        </div>
      </div>
      <div class="field">
        <label>桌子深度 <span class="label-hint">（标准 60"，每 5" 一条参考线）</span></label>
        <div class="field-row">
          <input type="number" id="setup-depth" value="60" min="12" max="120" step="1" />
          <span class="field-unit">英寸</span>
        </div>
      </div>
      <div class="field">
        <label>排布模式</label>
        <div class="mode-cards" id="setup-mode-cards"></div>
      </div>
    </div>
    <div class="setup-footer">
      <button class="btn-primary lg" id="setup-confirm-btn">开始布局 →</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     MAIN APP SHELL
  ═══════════════════════════════════════════════ -->
<div id="app-shell" class="app-shell hidden">

  <!-- ── TOPBAR ────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">📐</span>
      <span class="brand-title">陈列小助手</span>
    </div>
    <div class="step-nav">
      <button class="step-btn active" id="nav-builder" data-step="builder">
        <span class="step-num">1</span> 布局设计
      </button>
      <span class="step-sep">›</span>
      <button class="step-btn" id="nav-blueprint" data-step="blueprint" disabled>
        <span class="step-num">2</span> 生成图纸
      </button>
    </div>
    <div class="topbar-right">
      <div class="table-pill" id="table-pill">— 未设置 —</div>
      <button class="btn-ghost sm" id="change-setup-btn">修改桌子</button>
    </div>
  </header>

<!-- ════ BUILDER VIEW ════ -->
  <div id="builder-view" class="builder-view">

    <!-- Left: Element Library -->
    <aside class="panel lib-panel" id="lib-panel">
      <div class="panel-head">
        <span class="panel-title">元素库</span>
        <button class="btn-ghost icon sm" id="lib-collapse-btn" title="折叠">◀</button>
      </div>
      <div class="lib-search">
        <input type="search" id="lib-search" placeholder="搜索元素…" />
      </div>
      <div class="lib-types" id="lib-types"></div>
      <div class="lib-list" id="lib-list"></div>
    </aside>

    <!-- Center: Rail builder -->
    <main class="builder-main">

      <!-- Front Rail -->
      <div class="rail-zone" id="front-zone">
        <div class="rail-header">
          <div class="rail-label front-label">
            <span class="rail-dot front-dot"></span>
            前沿 <span class="rail-sub">Front Rail</span>
          </div>
          <div class="rail-stats" id="front-stats"></div>
          <button class="btn-ghost icon sm" id="front-clear-btn" title="清空">✕</button>
        </div>
        <div class="rail" id="front-rail">
          <div class="rail-empty-hint" id="front-empty-hint">点击元素库中的 <strong>＋</strong> 加入前沿</div>
        </div>
        <div class="usage-bar-wrap">
          <div class="usage-bar">
            <div class="usage-fill" id="front-usage-fill"></div>
            <div class="usage-label" id="front-usage-label">0 / 0"</div>
          </div>
        </div>
      </div>

      <!-- Back Rail (double modes only) -->
      <div class="rail-zone" id="back-zone" style="display:none">
        <div class="rail-header">
          <div class="rail-label back-label">
            <span class="rail-dot back-dot"></span>
            后沿 <span class="rail-sub">Back Rail</span>
          </div>
          <div class="rail-stats" id="back-stats"></div>
          <button class="btn-ghost icon sm" id="back-clear-btn" title="清空">✕</button>
        </div>
        <div class="rail" id="back-rail">
          <div class="rail-empty-hint">点击元素库中的 <strong>＋</strong> 加入后沿</div>
        </div>
        <div class="usage-bar-wrap">
          <div class="usage-bar">
            <div class="usage-fill" id="back-usage-fill"></div>
            <div class="usage-label" id="back-usage-label">0 / 0"</div>
          </div>
        </div>
      </div>

      <!-- Validation messages -->
      <div id="validation-msgs" class="validation-msgs"></div>

      <!-- Actions -->
      <div class="builder-actions">
        <button class="btn-ghost" id="reset-all-btn">全部清空</button>
        <button class="btn-primary" id="generate-btn" disabled>生成图纸 →</button>
      </div>
    </main>

    <!-- Right: Summary panel -->
    <aside class="panel summary-panel" id="summary-panel">
      <div class="panel-head">
        <span class="panel-title">摆放清单</span>
      </div>
      <div id="summary-list" class="summary-list">
        <p class="summary-empty">还没有放置任何元素。</p>
      </div>
      <div class="summary-stats" id="summary-stats"></div>
    </aside>
  </div>

  <!-- ════ BLUEPRINT VIEW ════ -->
  <div id="blueprint-view" class="blueprint-view hidden">
    <div class="blueprint-toolbar">
      <button class="btn-ghost" id="back-to-builder-btn">← 返回编辑</button>
      <div class="bp-info" id="bp-info"></div>
      <div class="bp-actions">
        <button class="btn-ghost" id="export-json-btn">导出 JSON</button>
        <button class="btn-primary" id="export-png-btn">导出 PNG</button>
      </div>
    </div>
    <div class="blueprint-canvas-wrap" id="blueprint-canvas-wrap">
      <canvas id="blueprint-canvas"></canvas>
    </div>
    <div id="bp-validation-msgs" class="blueprint-msgs"></div>
  </div>

</div><!-- /app-shell -->

<script type="module" src="/src/main.js"></script>
</body>
</html>
