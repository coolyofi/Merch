<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的桌子 — Merchandising 陈列计算器</title>
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    body { background: #0a0a0a; }
    .login-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .login-hero {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-hero h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f5f5f7;
      margin: 0 0 8px;
    }
    .login-hero p {
      color: #86868b;
      font-size: 1rem;
      margin: 0;
    }
    .login-card {
      background: #1c1c1e;
      border: 1px solid #2d2d2f;
      border-radius: 18px;
      padding: 36px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .login-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .login-tab {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: #86868b;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .login-tab.active {
      background: #2d2d2f;
      color: #f5f5f7;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .login-field label {
      font-size: 0.8rem;
      color: #86868b;
      letter-spacing: 0.02em;
    }
    .login-field input {
      background: #2d2d2f;
      border: 1px solid #3a3a3c;
      border-radius: 10px;
      color: #f5f5f7;
      padding: 11px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-field input:focus {
      border-color: #0a84ff;
    }
    .login-submit {
      margin-top: 4px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: #0a84ff;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .login-submit:hover { opacity: 0.88; }
    .login-submit:disabled { opacity: 0.4; cursor: default; }
    .login-msg {
      text-align: center;
      font-size: 0.85rem;
      min-height: 18px;
      color: #ff453a;
    }
    .login-msg.ok { color: #30d158; }
    .logged-in-card {
      background: #1c1c1e;
      border: 1px solid #2d2d2f;
      border-radius: 18px;
      padding: 36px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }
    .logged-in-card .user-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #0a84ff22;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
    }
    .logged-in-card .user-email {
      color: #f5f5f7;
      font-size: 1rem;
      font-weight: 500;
    }
    .logged-in-card .user-label {
      color: #86868b;
      font-size: 0.82rem;
    }
    .logged-in-actions {
      display: flex; flex-direction: column; gap: 10px; width: 100%;
    }
    .btn-primary-full {
      padding: 13px;
      border: none; border-radius: 12px;
      background: #0a84ff; color: #fff;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-primary-full:hover { opacity: 0.88; }
    .btn-ghost-full {
      padding: 11px;
      border: 1px solid #3a3a3c; border-radius: 12px;
      background: transparent; color: #86868b;
      font-size: 0.88rem;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost-full:hover { border-color: #6e6e73; color: #f5f5f7; }
  </style>
</head>
<body>
<div class="login-shell">
  <div class="login-hero">
    <h1>我的桌子</h1>
    <p>Merchandising 陈列计算器</p>
  </div>

  <!-- 未登录：登录/注册卡片 -->
  <div class="login-card" id="auth-card">
    <div class="login-tabs">
      <button class="login-tab active" id="tab-login" onclick="switchTab('login')">登录</button>
      <button class="login-tab" id="tab-register" onclick="switchTab('register')">注册</button>
    </div>

    <div class="login-field">
      <label>邮箱</label>
      <input type="email" id="input-email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="login-field">
      <label>密码</label>
      <input type="password" id="input-pwd" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="login-field" id="field-name" style="display:none">
      <label>名字（可选）</label>
      <input type="text" id="input-name" placeholder="你的名字" autocomplete="name" />
    </div>

    <div class="login-msg" id="auth-msg"></div>
    <button class="login-submit" id="submit-btn" onclick="doSubmit()">登录</button>
  </div>

  <!-- 已登录：欢迎卡片 -->
  <div class="logged-in-card" id="loggedin-card" style="display:none">
    <div class="user-avatar">🪑</div>
    <div>
      <div class="user-email" id="user-display"></div>
      <div class="user-label">我的桌子</div>
    </div>
    <div class="logged-in-actions">
      <button class="btn-primary-full" onclick="goToApp()">进入计算器</button>
      <button class="btn-ghost-full" onclick="doLogout()">退出登录</button>
    </div>
  </div>
</div>
<script type="module" src="/src/account.js"></script>
</body>
</html>
